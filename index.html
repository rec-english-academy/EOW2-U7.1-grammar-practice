<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EOW2 Grammar Practice</title>
<style>:root{
  --red:#ef3b3b;--red-dark:#c91f2f;--ink:#273043;--muted:#6d7486;
  --blue:#3b82f6;--green:#16a34a;--yellow:#facc15;--orange:#fb923c;
  --card:#fff;--shadow:0 18px 45px rgba(39,48,67,.15);--soft:0 10px 28px rgba(39,48,67,.10)
}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Trebuchet MS",Arial,sans-serif;color:var(--ink);background:#f8fafc}
button,input{font:inherit}button{cursor:pointer;border:0}.hidden{display:none!important}
.app{min-height:100vh;padding:22px;background:radial-gradient(circle at 10% 8%,rgba(250,204,21,.23),transparent 23%),radial-gradient(circle at 90% 15%,rgba(59,130,246,.18),transparent 26%),radial-gradient(circle at 52% 93%,rgba(236,72,153,.15),transparent 26%),linear-gradient(135deg,#fff8f1 0%,#f7fbff 45%,#fff5f7 100%)}
.screen{max-width:1180px;margin:0 auto}.login-card{width:min(940px,96vw);margin:5vh auto 0;background:rgba(255,255,255,.9);border:3px solid rgba(255,255,255,.95);border-radius:36px;box-shadow:var(--shadow);overflow:hidden}
.login-top{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;padding:38px;background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff}.brand{font-size:28px;font-weight:1000;letter-spacing:.08em;margin-bottom:18px}.title-pill{display:inline-block;background:rgba(255,255,255,.17);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:8px 12px;font-weight:1000;margin-bottom:10px}h1{font-size:clamp(36px,5.2vw,66px);line-height:.95;margin:0 0 14px;font-weight:1000;letter-spacing:-.04em}.login-top p{font-size:clamp(16px,2vw,21px);margin:0;line-height:1.45;color:rgba(255,255,255,.92)}
.unit-badge{justify-self:end;align-self:center;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.36);border-radius:28px;padding:24px 26px;min-width:230px}.unit-badge .small{font-weight:800;opacity:.9;text-transform:uppercase;letter-spacing:.08em;font-size:13px}.unit-badge .big{display:block;font-size:44px;font-weight:1000;letter-spacing:-.04em;margin:3px 0 6px}.unit-badge .focus{font-weight:900;font-size:16px;line-height:1.35}
.login-body{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:34px 38px 38px}.panel{background:#fff;border:2px solid rgba(39,48,67,.08);border-radius:28px;box-shadow:var(--soft);padding:26px}.panel h2{margin:0 0 16px;font-size:24px}.field{margin-bottom:16px}label{display:block;font-weight:900;margin-bottom:7px;color:#334155}input{width:100%;border:2px solid #e2e8f0;border-radius:18px;padding:14px 16px;font-size:17px;background:#f8fafc;outline:none}input:focus{border-color:var(--red);box-shadow:0 0 0 5px rgba(239,59,59,.12);background:#fff}.error{min-height:24px;color:#dc2626;font-weight:800;font-size:14px;margin:2px 0 10px}
.primary,.secondary,.tiny,.check,.next{border-radius:18px;font-weight:1000;box-shadow:0 10px 18px rgba(39,48,67,.12),inset 0 -4px rgba(0,0,0,.10);transition:.13s}.primary:hover,.secondary:hover,.tiny:hover,.check:hover,.next:hover{transform:translateY(-2px)}.primary{width:100%;padding:15px 18px;background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;font-size:18px}.secondary{padding:12px 16px;background:#fff;color:var(--ink);border:2px solid #e2e8f0}.tiny{width:100%;padding:11px 13px;background:#fff;color:var(--ink);border:2px solid #e2e8f0;text-align:left;margin-bottom:9px}
.preview-item{display:flex;gap:15px;align-items:flex-start;padding:15px 0;border-bottom:1px dashed #e2e8f0}.preview-item:last-child{border-bottom:0}.preview-icon{width:46px;height:46px;border-radius:16px;background:#fff1f2;display:grid;place-items:center;font-size:24px}.preview-item strong{display:block;font-size:19px}.preview-item span{display:block;color:var(--muted);font-weight:800;line-height:1.35;margin-top:4px}
.game-header{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;margin-bottom:18px}.game-title{display:flex;gap:14px;align-items:center;background:rgba(255,255,255,.88);border:2px solid rgba(255,255,255,.92);border-radius:30px;padding:14px 18px;box-shadow:var(--soft)}.logo-box{background:linear-gradient(135deg,var(--red),var(--red-dark));border-radius:18px;min-width:102px;height:64px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:1000;letter-spacing:.06em}.game-title h2{margin:0;font-size:26px}.game-title p{margin:3px 0 0;color:var(--muted);font-weight:900}.student-card{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #edf2f7;border-radius:23px;padding:10px 12px;min-width:260px}.avatar{width:48px;height:48px;border-radius:17px;display:grid;place-items:center;background:#fee2e2;color:var(--red-dark);font-size:24px;font-weight:1000}.student-meta strong{display:block}.student-meta span{color:var(--muted);font-weight:800;font-size:13px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:12px}.stat{background:#fff;border:2px solid rgba(39,48,67,.07);border-radius:22px;padding:14px 16px;box-shadow:var(--soft)}.stat span{color:var(--muted);font-weight:900}.stat strong{display:block;font-size:28px;margin-top:4px}.progress-wrap{height:14px;background:#fff;border-radius:999px;border:2px solid #e5e7eb;overflow:hidden;margin-bottom:18px}.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow));transition:.25s}
.main-layout{display:grid;grid-template-columns:320px 1fr;gap:18px}.sidebar{display:flex;flex-direction:column;gap:14px}.side-card,.stage{background:rgba(255,255,255,.91);border:2px solid rgba(255,255,255,.92);border-radius:30px;box-shadow:var(--soft)}.side-card{padding:20px}.side-card h3{margin:0 0 12px;font-size:21px}.rule-box{border:2px dashed #cbd5e1;border-radius:20px;padding:14px 16px;margin-bottom:12px;font-weight:1000;line-height:1.45}.q{color:#2563eb}.yes{color:#16a34a}.no{color:#dc2626}.tip{color:var(--muted);font-weight:900;line-height:1.45}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:9px 11px;border-radius:999px;background:#eef2ff;border:2px solid #c7d2fe;color:#3730a3;font-weight:1000}
.stage{overflow:hidden}.stage-top{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:2px solid #edf2f7}.level-label{display:flex;align-items:center;gap:9px;color:var(--red-dark);font-weight:1000;font-size:18px}.level-dot{width:26px;height:26px;border-radius:50%;background:#fee2e2;display:inline-grid;place-items:center}.level-dot:after{content:"";width:13px;height:13px;border-radius:50%;background:var(--red)}
.question-area{padding:26px 28px;display:grid;grid-template-columns:320px 1fr;gap:28px;align-items:center;min-height:420px}.question-area.no-visual{grid-template-columns:1fr;padding:44px 64px}.question-area.no-visual .visual-card{display:none}.visual-card{background:linear-gradient(180deg,#fff,#f3f6ff);border:3px solid #edf2f7;border-radius:28px;min-height:300px;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}.visual-card img{width:100%;height:300px;object-fit:contain;border-radius:20px;display:block}.visual-icon{font-size:78px;line-height:1;text-align:center;filter:drop-shadow(0 12px 12px rgba(39,48,67,.12))}.visual-text{text-align:center}.visual-text .big{font-size:64px;line-height:1.1}.visual-text .caption{margin-top:14px;font-size:18px;font-weight:1000;color:var(--muted)}.prompt-block h3{font-size:clamp(32px,4.5vw,52px);line-height:1.08;margin:0 0 18px;letter-spacing:-.04em}.question-sentence{white-space:pre-line;display:inline-block;background:#fff5f5;border:2px solid #fecaca;color:#991b1b;border-radius:20px;padding:12px 18px;font-size:23px;font-weight:1000;margin-bottom:18px}.helper{color:var(--muted);font-size:18px;font-weight:900;margin-bottom:18px;line-height:1.45}
.options{display:grid;grid-template-columns:1fr 1fr;gap:14px}.option{padding:17px 18px;text-align:left;background:#fff;border:3px solid #e2e8f0;border-radius:20px;font-size:19px;font-weight:1000;color:#222;box-shadow:0 8px 14px rgba(39,48,67,.07)}.option.selected{border-color:#93c5fd;background:#eff6ff}.option.correct{border-color:#16a34a;background:#dcfce7;color:#064e3b}.option.wrong{border-color:#ef4444;background:#fee2e2;color:#7f1d1d}
.type-row{display:flex;gap:10px;align-items:center}.type-input{font-size:21px;font-weight:1000;max-width:410px}.builder-bank,.built-row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.word-token{padding:12px 16px;border-radius:16px;background:#fff;border:2px solid #e2e8f0;font-weight:1000;font-size:19px}.word-token.used{opacity:.35;pointer-events:none}.built-row{min-height:70px;border:3px dashed #cbd5e1;border-radius:20px;padding:12px}.feedback{margin-top:16px;padding:14px 16px;border-radius:18px;font-weight:1000;font-size:17px;line-height:1.45}.feedback.good{background:#dcfce7;border:2px solid #86efac;color:#065f46}.feedback.bad{background:#fff7ed;border:2px solid #fed7aa;color:#9a3412}
.bottom-actions{display:flex;justify-content:space-between;gap:14px;align-items:center;border-top:2px solid #edf2f7;padding:18px 22px}.microcopy{font-weight:900;color:var(--muted)}.check,.next{padding:15px 22px;color:#fff;font-size:19px}.check{background:linear-gradient(135deg,#60a5fa,#2563eb)}.next{background:linear-gradient(135deg,#22c55e,#15803d)}.next:disabled,.check:disabled{opacity:.45;cursor:not-allowed;transform:none}
.result-card{max-width:920px;margin:5vh auto;background:#fff;border-radius:34px;padding:34px;box-shadow:var(--shadow);text-align:center}.result-card h2{font-size:46px;margin:0 0 8px}.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}.report{background:#f8fafc;border:2px solid #e2e8f0;border-radius:20px;padding:14px}.report span{display:block;color:var(--muted);font-weight:900}.report strong{font-size:29px}.review-table{width:100%;border-collapse:separate;border-spacing:0 8px;margin-top:18px;text-align:left}.review-table td,.review-table th{background:#f8fafc;padding:10px;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;font-weight:900}.review-table th{background:#fff;color:var(--muted)}
@media(max-width:980px){.login-top,.login-body,.game-header,.main-layout,.question-area{grid-template-columns:1fr}.unit-badge{justify-self:stretch}.stats-grid{grid-template-columns:repeat(2,1fr)}.student-card{min-width:0}.sidebar{order:2}.stage{order:1}.options{grid-template-columns:1fr}.visual-card{min-height:180px}.bottom-actions{align-items:stretch;flex-direction:column}.check,.next{width:100%}.report-grid{grid-template-columns:1fr}}
@media(max-width:560px){.app{padding:12px}.login-top,.login-body,.question-area{padding:20px}.login-card{border-radius:26px}.prompt-block h3{font-size:29px}.question-sentence{font-size:18px}.stats-grid{gap:8px}.stat{padding:10px}.review-table{font-size:12px}}
@media print{.app{background:#fff;padding:0}.result-card{box-shadow:none;margin:0;max-width:none}.secondary{display:none}}

.question-sentence{white-space:pre-line}

.brand-with-logo{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.hero-logo{height:72px;width:auto;display:block;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,.18)}
.header-logo{height:42px;width:auto;display:block;border-radius:10px}
.game-title .logo-box{display:flex;align-items:center;justify-content:center;background:#111;border-radius:18px;padding:8px 12px;min-width:104px;min-height:58px;overflow:hidden}
.game-title .logo-box img{display:block;height:38px;width:auto}
@media (max-width:700px){
  .hero-logo{height:58px}
  .header-logo{height:34px}
  .brand-with-logo{gap:12px}
}


/* Correct R.E.C logo sizing */
.hero-logo{
  height:78px!important;
  width:78px!important;
  object-fit:cover!important;
  border-radius:18px!important;
  background:#000!important;
}
.game-title .logo-box{
  background:#000!important;
  min-width:86px!important;
  width:86px!important;
  height:64px!important;
  padding:7px!important;
}
.game-title .logo-box img,
.header-logo{
  width:100%!important;
  height:100%!important;
  object-fit:cover!important;
  border-radius:12px!important;
}
@media(max-width:700px){
  .hero-logo{height:64px!important;width:64px!important}
  .game-title .logo-box{min-width:72px!important;width:72px!important;height:56px!important}
}


/* ===== Red hero banner update ===== */
.login-card{overflow:hidden}
.login-top{
  background:linear-gradient(135deg,#d84e46 0%, #d84e46 58%, #cf4740 100%) !important;
  color:#fff !important;
  padding:28px 30px 34px !important;
  border-radius:28px 28px 0 0 !important;
}
.login-top .brand-with-logo{
  align-items:flex-start !important;
  gap:14px !important;
  margin-bottom:14px !important;
}
.login-top .hero-logo{
  height:64px !important;
  width:64px !important;
  border-radius:16px !important;
  box-shadow:none !important;
  background:#000 !important;
  flex:0 0 auto;
}
.login-top .brand{
  color:#fff !important;
  font-size:18px !important;
  font-weight:700 !important;
  letter-spacing:.08em !important;
  margin:0 !important;
}
.login-top .title-pill{
  display:inline-block !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.20) !important;
  color:#fff !important;
  margin-bottom:14px !important;
}
.login-top h1{
  color:#fff !important;
  font-size:clamp(2.5rem, 7vw, 5rem) !important;
  line-height:.95 !important;
  letter-spacing:-.04em !important;
  margin:0 0 18px !important;
  max-width:760px !important;
}
.login-top p{
  color:rgba(255,255,255,.97) !important;
  font-size:clamp(1rem, 2.3vw, 1.45rem) !important;
  line-height:1.45 !important;
  max-width:760px !important;
  margin:0 !important;
}
.login-top .unit-badge{
  background:rgba(255,255,255,.12) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  color:#fff !important;
  box-shadow:none !important;
}
.login-top .unit-badge .small,
.login-top .unit-badge .big,
.login-top .unit-badge .focus{
  color:#fff !important;
}
.login-top .unit-badge .big{font-size:clamp(2rem,4vw,3.2rem)!important;line-height:1}
.login-top .unit-badge .focus{opacity:.95 !important}
.login-body{
  margin-top:0 !important;
  border-radius:0 0 28px 28px !important;
}
@media (max-width: 820px){
  .login-top{
    padding:24px 20px 28px !important;
  }
  .login-top h1{
    max-width:none !important;
  }
  .login-top .unit-badge{
    margin-top:8px !important;
  }
}


/* Integrated white R.E.C logo directly on the red background */
.login-top .hero-logo{
  width:min(390px,72vw)!important;
  height:auto!important;
  object-fit:contain!important;
  background:transparent!important;
  border-radius:0!important;
  box-shadow:none!important;
  flex:0 0 auto!important;
}
.login-top .brand{
  display:none!important;
}
.login-top .brand-with-logo{
  display:block!important;
  margin-bottom:18px!important;
}
.game-title .logo-box{
  background:linear-gradient(135deg,var(--red),var(--red-dark))!important;
  min-width:112px!important;
  width:112px!important;
  height:64px!important;
  padding:8px 10px!important;
  border-radius:18px!important;
}
.game-title .logo-box img,
.header-logo{
  width:100%!important;
  height:100%!important;
  object-fit:contain!important;
  background:transparent!important;
  border-radius:0!important;
}
@media(max-width:700px){
  .login-top .hero-logo{width:min(300px,82vw)!important}
  .game-title .logo-box{min-width:92px!important;width:92px!important;height:56px!important}
}


/* ===== FINAL MASTER LOGO SIZING ===== */
.login-top .brand-with-logo{
  display:block!important;
  margin:0 0 18px!important;
}
.login-top .hero-logo{
  width:clamp(150px, 22vw, 230px)!important;
  height:auto!important;
  max-height:none!important;
  object-fit:contain!important;
  object-position:left center!important;
  background:transparent!important;
  border-radius:0!important;
  box-shadow:none!important;
  display:block!important;
}
.game-title .logo-box{
  background:linear-gradient(135deg,var(--red),var(--red-dark))!important;
  min-width:88px!important;
  width:88px!important;
  height:58px!important;
  padding:8px!important;
  border-radius:16px!important;
  overflow:hidden!important;
}
.game-title .logo-box img,
.game-title .header-logo{
  width:100%!important;
  height:100%!important;
  object-fit:contain!important;
  object-position:center!important;
  background:transparent!important;
  border-radius:0!important;
}
@media(max-width:820px){
  .login-top .hero-logo{
    width:clamp(135px, 38vw, 190px)!important;
  }
}
@media(max-width:560px){
  .login-top .hero-logo{
    width:145px!important;
  }
  .game-title .logo-box{
    min-width:74px!important;
    width:74px!important;
    height:52px!important;
  }
}
/* Unit 7.1 demo additions */
.review-table small{font-size:11px;line-height:1.3}.visual-card img{background:#fff}.tiny:disabled{opacity:.45;cursor:not-allowed}.side-card h3:nth-child(1){letter-spacing:-.01em}
</style>

<style>
.visual-card img{max-height:460px;height:auto;object-fit:contain}
.question-area:not(.no-visual){align-items:start}
@media(max-width:980px){.visual-card img{max-height:380px}}
</style>

</head>

<script>(() => {
"use strict";
const CONFIG = window.UNIT_CONFIG;
const LEVELS = window.QUESTION_LEVELS;
if (!CONFIG || !Array.isArray(LEVELS)) throw new Error("Missing UNIT_CONFIG or QUESTION_LEVELS.");
const $ = id => document.getElementById(id);
const escapeHtml = s => String(s ?? "").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function validateBlueprint(){
 const expected=CONFIG.blueprint?.levelItemCounts || [4,5,5,5,5,6];
 const counts=LEVELS.map(l=>l.items.length);
 const total=counts.reduce((a,b)=>a+b,0);
 const ids=[];
 LEVELS.forEach(l=>l.items.forEach(q=>ids.push(q.question_id)));
 const errors=[];
 if(total!==30) errors.push(`Expected 30 questions, found ${total}.`);
 if(JSON.stringify(counts)!==JSON.stringify(expected)) errors.push(`Expected level counts ${expected.join('-')}, found ${counts.join('-')}.`);
 if(new Set(ids).size!==ids.length) errors.push("Duplicate question_id found.");
 LEVELS.forEach((l,li)=>l.items.forEach((q,qi)=>{
   for(const field of ["question_id","skill_id","difficulty","error_code","type","title","q","answer"]){ if(q[field]===undefined) errors.push(`L${li+1} Q${qi+1}: missing ${field}.`); }
 }));
 if(errors.length){ console.error("EOW2 Blueprint validation",errors); alert("Question data validation failed. Open the browser console for details."); }
}

function applyConfig(){
 document.title=CONFIG.pageTitle;
 $("lessonLabel").textContent=CONFIG.lessonLabel;
 $("heroTitle").innerHTML=escapeHtml(CONFIG.heroTitle).replace(/\n/g,"<br>");
 $("heroDescription").textContent=CONFIG.description;
 $("topicLabel").textContent=CONFIG.topic;
 $("unitLabel").textContent=`Unit ${CONFIG.unit}`;
 $("focusLabel").textContent=CONFIG.focus.join(" • ");
 $("gameHeading").textContent=`${CONFIG.course} Grammar Practice — Unit ${CONFIG.unit}`;
 $("gameSubtitle").textContent=CONFIG.headerSubtitle;
 $("unitIcon").textContent=CONFIG.icon;
 $("previewList").innerHTML=CONFIG.preview.map(([i,t,d])=>`<div class="preview-item"><div class="preview-icon">${escapeHtml(i)}</div><div><strong>${escapeHtml(t)}</strong><span>${escapeHtml(d)}</span></div></div>`).join("");
 $("grammarGuide").innerHTML=CONFIG.grammarGuide.map(([a,b],i)=>`<div class="rule-box"><span class="q">${escapeHtml(a)}</span><br><span class="${i===CONFIG.grammarGuide.length-1?'no':'yes'}">${escapeHtml(b)}</span></div>`).join("");
 $("grammarTip").textContent=CONFIG.grammarTip;
 $("wordBank").innerHTML=CONFIG.wordBank.map(w=>`<span class="chip">${escapeHtml(w)}</span>`).join("");
 $("submitTip").textContent=`Submit becomes available after all ${CONFIG.blueprint.total} missions are completed.`;
}

const questions=[];
LEVELS.forEach((level,li)=>level.items.forEach(item=>questions.push({...item,level:li,levelName:level.name})));
const TOTAL=questions.length;
let index=0,score=0,correct=0,streak=0,checked=false,selected="",built=[],results=[];
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function normalize(s){return String(s||"").trim().toLowerCase().replace(/[’]/g,"'").replace(/\s+/g," ").replace(/\s+([?.!,])/g,"$1").replace(/\s*,\s*/g,", ").replace(/[?.!]+$/g,"").trim();}
function acceptedAnswers(q){return [q.answer,...(q.accept||[])].map(normalize);}
function currentAnswer(){const q=questions[index];if(q.type==="mcq")return selected;if(q.type==="type")return $("typeInput")?.value||"";if(q.type==="builder")return built.join(" ").replace(/\s+([?.!,])/g,"$1").replace(/,\s*/g,", ");return "";}
function isCorrect(q,ans){return acceptedAnswers(q).includes(normalize(ans));}
function renderVisual(q){const area=$("questionArea"),card=$("visualCard"),hasImage=Boolean(q.image);area.classList.toggle("no-visual",!hasImage);card.innerHTML=hasImage?`<img src="${q.image}" alt="Picture clue">`:"";}
function render(){const q=questions[index];checked=false;selected="";built=[];$("levelLabel").textContent=q.levelName;$("itemType").textContent=q.type==="mcq"?"Choose one":q.type==="type"?"Type the answer":"Build the sentence";$("promptTitle").textContent=q.title;$("questionSentence").textContent=q.q;$("helper").textContent=q.helper||`Skill: ${q.skill_id} • Difficulty ${q.difficulty}`;renderVisual(q);$("feedback").className="feedback hidden";$("feedback").textContent="";$("nextBtn").disabled=true;$("checkBtn").disabled=false;$("resetBtn").disabled=false;const a=$("answerArea");a.innerHTML="";
 if(q.type==="mcq"){const box=document.createElement("div");box.className="options";q.options.forEach(opt=>{const b=document.createElement("button");b.type="button";b.className="option";b.textContent=opt;b.onclick=()=>{if(checked)return;selected=opt;box.querySelectorAll(".option").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");};box.appendChild(b);});a.appendChild(box);} 
 else if(q.type==="type"){const row=document.createElement("div");row.className="type-row";const inp=document.createElement("input");inp.id="typeInput";inp.className="type-input";inp.placeholder="Type your answer";inp.autocomplete="off";inp.onkeydown=e=>{if(e.key==="Enter")$("checkBtn").click();};row.appendChild(inp);a.appendChild(row);setTimeout(()=>inp.focus(),50);} 
 else if(q.type==="builder"){const zone=document.createElement("div"),builtRow=document.createElement("div"),bank=document.createElement("div");zone.className="builder-zone";builtRow.className="built-row";bank.className="builder-bank";shuffle(q.tokens.map((t,i)=>({t,i}))).forEach(obj=>{const b=document.createElement("button");b.type="button";b.className="word-token";b.textContent=obj.t;b.onclick=()=>{if(checked||b.classList.contains("used"))return;b.classList.add("used");built.push(obj.t);const x=document.createElement("button");x.type="button";x.className="word-token";x.textContent=obj.t;x.onclick=()=>{if(checked)return;const pos=[...builtRow.children].indexOf(x);built.splice(pos,1);b.classList.remove("used");x.remove();};builtRow.appendChild(x);};bank.appendChild(b);});zone.appendChild(builtRow);zone.appendChild(bank);a.appendChild(zone);}updateStats();}
function showFeedback(ok,text){const f=$("feedback");f.className="feedback "+(ok?"good":"bad");f.textContent=text;}
function check(){if(checked)return;const q=questions[index],ans=currentAnswer();if(!String(ans).trim()){showFeedback(false,"Please answer before checking.");return;}checked=true;const ok=isCorrect(q,ans);if(ok){correct++;score+=10;streak++;}else streak=0;results.push({n:index+1,question_id:q.question_id,skill_id:q.skill_id,difficulty:q.difficulty,error_code:q.error_code,q:q.q,answer:ans,correct:q.answer,ok});if(q.type==="mcq")document.querySelectorAll(".option").forEach(b=>{b.disabled=true;if(normalize(b.textContent)===normalize(q.answer))b.classList.add("correct");else if(b.classList.contains("selected"))b.classList.add("wrong");});if(q.type==="type")$("typeInput").disabled=true;if(q.type==="builder")document.querySelectorAll(".word-token").forEach(b=>b.disabled=true);showFeedback(ok,(ok?"Correct! ":`Not quite. Correct answer: ${q.answer} `)+(q.explain||"")+(ok?"":` [${q.error_code}]`));$("checkBtn").disabled=true;$("nextBtn").disabled=false;$("resetBtn").disabled=true;updateStats();}
function next(){if(!checked)return;if(index<TOTAL-1){index++;render();}else finish();}
function resetCurrent(){if(!checked)render();}
function updateStats(){const completed=results.length;$("missionStat").textContent=`${Math.min(index+1,TOTAL)}/${TOTAL}`;$("scoreStat").textContent=score;$("correctStat").textContent=correct;$("streakStat").textContent=`${streak} 🔥`;$("progressBar").style.width=`${completed/TOTAL*100}%`;$("submitBtn").disabled=completed<TOTAL;}
function finish(){if(results.length<TOTAL){alert(`Please complete all ${TOTAL} missions before submitting.`);return;}$("gameScreen").classList.add("hidden");$("resultScreen").classList.remove("hidden");const acc=Math.round(correct/TOTAL*100);$("finalCorrect").textContent=`${correct}/${TOTAL}`;$("finalAccuracy").textContent=`${acc}%`;$("finalScore").textContent=score;$("resultMessage").textContent=acc>=90?CONFIG.resultMessages.excellent:acc>=75?CONFIG.resultMessages.good:CONFIG.resultMessages.review;const body=$("reviewBody");body.innerHTML="";results.forEach(r=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${r.n}</td><td><small>${escapeHtml(r.question_id)}<br>${escapeHtml(r.skill_id)}<br>D${r.difficulty}</small></td><td>${escapeHtml(r.q)}</td><td>${r.ok?"✅":"❌"} ${escapeHtml(r.answer)}</td><td>${escapeHtml(r.correct)}</td>`;body.appendChild(tr);});}
function speak(){const q=questions[index],text=`${q.title}. ${q.q}. ${q.helper||""}`;if("speechSynthesis" in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.88;speechSynthesis.speak(u);}}
$("loginForm").addEventListener("submit",e=>{e.preventDefault();const name=$("studentName").value.trim(),cls=$("studentClass").value.trim(),code=$("password").value;if(!name||!cls){$("loginError").textContent="Please enter your name and class.";return;}if(code!==CONFIG.practiceCode){$("loginError").textContent="Incorrect practice code.";return;}$("loginError").textContent="";$("studentDisplay").textContent=name;$("classDisplay").textContent=cls;$("loginScreen").classList.add("hidden");$("gameScreen").classList.remove("hidden");render();});
$("checkBtn").onclick=check;$("nextBtn").onclick=next;$("resetBtn").onclick=resetCurrent;$("readBtn").onclick=speak;$("submitBtn").onclick=finish;
$("copyBtn").onclick=async()=>{const name=$("studentDisplay").textContent,cls=$("classDisplay").textContent,acc=Math.round(correct/TOTAL*100);const text=`${CONFIG.course} Grammar Practice Unit ${CONFIG.unit}\nStudent: ${name}\nClass: ${cls}\nCorrect: ${correct}/${TOTAL}\nAccuracy: ${acc}%\nScore: ${score}`;try{await navigator.clipboard.writeText(text);$("copyBtn").textContent="✅ Result copied";}catch(e){alert(text);}};
applyConfig();validateBlueprint();updateStats();
})();
</script>
</body>
